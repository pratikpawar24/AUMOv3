# Render Blueprint — AUMOv3 Backend
# Docs: https://render.com/docs/blueprint-spec
# This only deploys the backend. Frontend is deployed on Vercel.

services:
  - type: web
    name: aumo3-backend
    runtime: node
    plan: free
    repo: https://github.com/pratikpawar24/AUMOv3
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://aumo3.vercel.app
      - key: ADMIN_EMAIL
        value: admin@aumo3.com
      - key: ADMIN_PASSWORD
        sync: false
